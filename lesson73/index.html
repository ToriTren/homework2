<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Форма личных данных</title>
    <link rel="stylesheet" href="src/normalize.css"/>
    <link rel="stylesheet" href="src/styles.css"/>
  </head>
  <body>
    <form action="#" method="post" id="personal-data-form">

      <fieldset>
        <h1>Ваши личные данные</h1>
        <label for="name">Ваше имя</label>
        <input class="input" type="text" name="name" placeholder="Имя" required />

        <label for="age">Ваш возраст</label>
        <input class="input" type="number" name="age" placeholder="Возраст" required
        />

        <label for="phone">Ваш номер телефона</label>
        <input class="input" type="tel" name="phone" placeholder="Номер телефона" required
        />

        <label for="email">Ваша почта</label>
        <input class="input" type="email" name="email" placeholder="Почта" required
        />
      </fieldset>

      <fieldset class="checkbox-fieldset">  
        <label for="message">Сообщение</label>
          <textarea class="textarea" type="message" name="message" placeholder="Ваше сообщение" required></textarea>
        <div class="checkbox-wrapper">
        <input class="checkbox" type="checkbox" name="accept-rules" required />
        <label class="label" for="accept-rules">Я принимаю правила</label>
        </div>
      </fieldset>

      <button class="submit-btn" type="submit">Отправить</button>
    </form>
  </body>
</html>
